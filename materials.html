<script>
document.addEventListener('click',function(e){var b=e.target.closest('#themeBtn');if(!b)return;var r=document.documentElement;var n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('theme',n);}catch(e){}});

<script>
/* =======================================================================
   강의자료 목록 — 이 부분만 고치면 됩니다.
   • 추가        : MATERIALS 배열에 { t:'제목', subj:'과목', type:'PDF', url:'파일주소' } 한 줄 추가
   • type 종류   : 'PDF' · 'PPT' · 'CODE' · 'ZIP' · 'DOC'
   • 파일 올리는 법: GitHub 저장소에 파일을 올리고 그 주소를 url 에 넣거나, 외부 링크(구글드라이브 등)를 넣으면 됩니다.
   • url 이 비어('') 있으면 '준비중'으로 표시됩니다.
   ======================================================================= */
const MATERIALS = [
  // 예) { t:'3주차 · 페이저와 임피던스 슬라이드', subj:'회로이론', type:'PPT', url:'https://.../phasor.pdf' },
  // 예) { t:'SRM 토크 해석 MATLAB 코드', subj:'전기기기', type:'CODE', url:'https://github.com/jinsunkim60/...' },
];

(function(){
  var list=document.getElementById('matlist'), filt=document.getElementById('filt');
  var esc=function(t){return (t||'').replace(/[&<>]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];});};
  if(!MATERIALS.length){
    filt.style.display='none';
    list.innerHTML='<div class="emptybox">아직 등록된 자료가 없습니다.<br>강의에 쓰인 슬라이드·문제지·MATLAB 코드를 여기에 올려 방문자가 내려받게 할 수 있습니다. (페이지 소스의 <b style="color:var(--text)">MATERIALS</b> 목록에 추가)</div>';
    return;
  }
  var subjects=['전체'].concat(MATERIALS.map(function(m){return m.subj;}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}));
  var cur='전체';
  function render(){
    filt.innerHTML=subjects.map(function(s){return '<button class="fbtn'+(s===cur?' on':'')+'" data-s="'+esc(s)+'">'+esc(s)+'</button>';}).join('');
    filt.querySelectorAll('.fbtn').forEach(function(b){ b.addEventListener('click',function(){ cur=b.dataset.s; render(); }); });
    var items=MATERIALS.filter(function(m){return cur==='전체'||m.subj===cur;});
    list.innerHTML=items.map(function(m){
      var type=(m.type||'PDF').toUpperCase();
      var dl=m.url? '<a class="dl" href="'+m.url+'" target="_blank" rel="noopener" download>↓ 다운로드</a>' : '<span class="dl soon">준비중</span>';
      return '<div class="mat"><div class="ic '+type+'">'+type+'</div>'+
        '<div class="body"><div class="subj">'+esc(m.subj||'')+'</div><h4>'+esc(m.t)+'</h4><div class="meta">'+type+(m.size?' · '+esc(m.size):'')+'</div></div>'+
        dl+'</div>';
    }).join('');
  }
  render();
})();
</script>
